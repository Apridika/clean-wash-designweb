<style>
    /* Menjinakkan efek Bootstrap khusus pada Navbar Lama */
    header .nav-links {
        display: flex !important;
        /* Memaksa menu tetap berjejer ke samping */
        list-style: none !important;
        /* Menghilangkan bullet/titik jika muncul */
        padding-left: 0 !important;
        /* Menghapus padding-left bawaan dari Bootstrap <ul> */
        margin-bottom: 0 !important;
        /* Menghapus margin-bottom bawaan dari Bootstrap <ul> */
    }

    header .nav-links li {
        margin: 0 !important;
        /* Memastikan margin antar list diatur oleh CSS lamamu */
        padding: 0 !important;
    }

    header .nav-links a {
        text-decoration: none !important;
        /* Menghilangkan garis bawah default browser/Bootstrap */
        display: inline-block !important;
        /* Menjaga ukuran tombol sesuai CSS lamamu */
    }

    :root {
        --primary-clean: #49b1c8;
        /* Biru muda khas laundry */
        --secondary-wash: #ffffff;
        /* Hijau mint fresh */
        --dark-clean: #333;
    }

    body {
        background-color: #f8f9fa;
    }

    .bg-gradient-clean {
        background: linear-gradient(135deg, var(--primary-clean), var(--primary-clean));
    }

    /* Styling Kartu Profil Anggota Tim */
    .team-card {
        border: none;
        border-radius: 15px;
        overflow: hidden;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .team-card:hover {
        transform: translateY(-8px);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1) !important;
    }

    .team-img-wrapper {
        position: relative;
        overflow: hidden;
        background-color: #e9ecef;
        height: 260px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    /* Icon pengganti jika belum ada foto asli */
    .team-placeholder-icon {
        font-size: 5rem;
        color: #adb5bd;
    }

    .social-links a {
        width: 35px;
        height: 35px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        background-color: #f1f3f5;
        color: #495057;
        text-decoration: none;
        transition: 0.2s;
    }

    .social-links a:hover {
        background-color: var(--primary-clean);
        color: white;
    }
</style>
